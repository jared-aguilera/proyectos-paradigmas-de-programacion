<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - Super Abarrotes</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <nav class="barra-navegacion">
        <h1>Super Abarrotes MVC</h1>
        <a th:href="@{/productos}" class="btn-carrito">← Seguir comprando</a>
    </nav>

    <div class="contenedor">
        <h2 class="titulo-seccion">Mi Carrito de Compras</h2>
        
        <table class="tabla-carrito">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio Unitario</th>
                    <th>Cantidad</th>
                    <th>Subtotal (Con Impuesto)</th>
                </tr>
            </thead>
            <tbody>
    <tr th:each="item : ${venta.listaItems}">
        <td>
            <div class="info-articulo">
                <img th:src="|/img/${item.producto.codigo}.png|" alt="Producto">
                <span class="producto-nombre" th:text="${item.producto.nombre}">Producto</span>
            </div>
        </td>
        <td th:text="'$' + ${item.producto.precioVenta}">$0.00</td>
        
        <td>
            <form th:action="@{/carrito/modificar}" method="POST" style="display: flex; align-items: center; gap: 5px;">
                <input type="hidden" name="codigo" th:value="${item.producto.codigo}">
                <input type="number" name="cantidad" th:value="${item.cantidad}" min="1" 
                       style="width: 60px; padding: 5px; border-radius: 4px; border: 1px solid #cbd5e1; text-align: center;">
                <button type="submit" style="background-color: #3b82f6; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer;">
                </button>
            </form>
        </td>
        <td class="producto-precio" th:text="'$' + ${#numbers.formatDecimal(item.calcularSubtotal(), 1, 2)}">$0.00</td>
        <td>
            <form th:action="@{/carrito/eliminar}" method="POST">
                <input type="hidden" name="codigo" th:value="${item.producto.codigo}">
                <button type="submit" class="btn-eliminar"> Quitar</button>
            </form>
        </td>
    </tr>
</tbody>
        </table>

        <div class="resumen-carrito">
    <div class="resumen-fila">
        <span>Subtotal:</span>
        <span th:text="'$' + ${#numbers.formatDecimal(venta.calcularTotalVenta(), 1, 2)}">$0.00</span>
    </div>

    <div class="seccion-descuentos">
        <p class="promo-titulo">APLICAR DESCUENTO:</p>
        <div class="botones-descuento">
            <form th:action="@{/carrito/descuento}" method="POST">
                <input type="hidden" name="tipo" value="PORCENTAJE">
                <input type="hidden" name="valor" value="10">
                <button type="submit" class="btn-promo btn-verde">10% OFF</button>
            </form>

            <form th:action="@{/carrito/descuento}" method="POST">
                <input type="hidden" name="tipo" value="FIJO">
                <input type="hidden" name="valor" value="50">
                <button type="submit" class="btn-promo btn-azul">-$50.00</button>
            </form>

            <form th:action="@{/carrito/descuento}" method="POST">
                <input type="hidden" name="tipo" value="NINGUNO">
                <input type="hidden" name="valor" value="0">
                <button type="submit" class="btn-promo btn-gris">Limpiar</button>
            </form>
        </div>
    </div>

    <div class="resumen-fila resumen-total">
        <span>TOTAL A PAGAR:</span>
        <span class="monto-final" th:text="'$' + ${#numbers.formatDecimal(venta.calcularTotalFinal(), 1, 2)}">$0.00</span>
    </div>
    
    <form th:action="@{/cobrar}" method="POST" class="formulario-cobro">
        <div class="campo-cliente">
            <label>Asignar Cliente:</label>
            <input type="text" name="nombreCliente" placeholder="Nombre o Teléfono del Cliente">
        </div>
        <button type="submit" class="btn-comprar">PAGAR AHORA</button>
    </form>
</div>
    </div>
</body>
</html>
