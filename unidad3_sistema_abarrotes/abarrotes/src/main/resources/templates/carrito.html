<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - Súper Abarrotes</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <nav class="barra-navegacion">
        <h1>🛒 Súper Abarrotes MVC</h1>
        <a th:href="@{/productos}" class="btn-carrito">← Seguir comprando</a>
    </nav>

    <div class="contenedor">
        <h2 class="titulo-seccion">Mi Carrito de Compras</h2>

        <table class="tabla-carrito">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio Unitario</th>
                    <th>Cantidad</th>
                    <th>Subtotal (Con Impuesto)</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${venta.listaItems}">
                    <td>
                        <div class="info-articulo">
                            <img th:src="|/img/${item.producto.codigo}.png|" alt="Producto">
                            <span class="producto-nombre" th:text="${item.producto.nombre}">Producto</span>
                        </div>
                    </td>
                    <td th:text="'$' + ${item.producto.precioVenta}">$0.00</td>
                    <td th:text="${item.cantidad}">1</td>
                    <td class="producto-precio" th:text="'$' + ${item.calcularSubtotal()}">$0.00</td>
                    <td>
                        <form th:action="@{/carrito/eliminar}" method="POST">
                            <input type="hidden" name="codigo" th:value="${item.producto.codigo}">
                            <button type="submit" class="btn-eliminar"> Quitar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="resumen-carrito">
            <div class="resumen-fila resumen-total">
                <span>TOTAL A PAGAR:</span>
                <span th:text="'$' + ${venta.calcularTotalVenta()}">$0.00</span>
            </div>
            
            <form th:action="@{/cobrar}" method="POST">
                <div style="margin-top: 20px; border-top: 2px solid #e2e8f0; padding-top: 15px;">
                    <label style="font-weight: bold; color: #334155; font-size: 0.9rem;"> Asignar Cliente :</label>
                    <input type="text" name="nombreCliente" placeholder="Nombre o Teléfono del Cliente" 
                           style="width: 100%; padding: 10px; margin-top: 8px; border-radius: 6px; border: 1px solid #cbd5e1;">
                </div>
                <button type="submit" class="btn-comprar">PAGAR AHORA</button>
            </form>
        </div>
    </div>
</body>
</html>
