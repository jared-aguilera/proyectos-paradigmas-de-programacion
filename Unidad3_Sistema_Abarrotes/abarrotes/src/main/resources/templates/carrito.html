<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - Súper Abarrotes</title>
    
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" href="../static/css/estilos.css">
</head>
<body>

    <nav class="navbar">
        <h1>🛒 Súper Abarrotes MVC</h1>
        <a href="/catalogo" class="btn-carrito">← Seguir comprando</a>
    </nav>

    <div class="contenedor">
        <h2 class="titulo-seccion">Mi Carrito de Compras</h2>

        <table class="tabla-carrito">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio Unitario</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                
                <tr>
                    <td>
                        <div class="item-info">
                            <img src="https://cdn-icons-png.flaticon.com/512/3173/3173426.png" alt="Gansito">
                            <span class="producto-nombre">Gansito Marinela</span>
                        </div>
                    </td>
                    <td>$25.00</td>
                    <td><strong>2</strong></td>
                    <td class="producto-precio">$50.00</td>
                    <td>
                        <button class="btn-eliminar">X Eliminar</button>
                    </td>
                </tr>

                <tr>
                    <td>
                        <div class="item-info">
                            <img src="https://cdn-icons-png.flaticon.com/512/869/869466.png" alt="Leche">
                            <span class="producto-nombre">Leche Alpura 1L</span>
                        </div>
                    </td>
                    <td>$28.50</td>
                    <td><strong>1</strong></td>
                    <td class="producto-precio">$28.50</td>
                    <td>
                        <button class="btn-eliminar">X Eliminar</button>
                    </td>
                </tr>

            </tbody>
        </table>

        <div class="resumen-carrito">
            <div class="resumen-fila">
                <span>Subtotal:</span>
                <span>$78.50</span>
            </div>
            <div class="resumen-fila" style="color: #ef4444;">
                <span>Descuento (Promo):</span>
                <span>-$0.00</span>
            </div>
            <div class="resumen-fila resumen-total">
                <span>TOTAL:</span>
                <span>$78.50</span>
            </div>
            
            <button class="btn-comprar">PAGAR AHORA</button>
        </div>

    </div>

</body>
</html>
